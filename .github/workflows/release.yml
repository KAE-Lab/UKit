name: Mobile App Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip preview build ?'
        type: boolean
        default: false
      build_production:
        description: 'Build production for iOS & Android ?'
        type: boolean
        default: false
      target_tag:
        description: 'Tag (ex: v5.4.1)'
        type: string
        required: true
        default: ''
      release_notes:
        description: 'Release notes for GitHub Release'
        type: string
        required: true
        default: 'Améliorations de la stabilité et corrections de bugs.'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build, Release and Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Update version files and push
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_tag != ''
        run: |
          TAG="${{ github.event.inputs.target_tag }}"
          CLEAN_VERSION=${TAG#v}

          npm version $CLEAN_VERSION --no-git-tag-version --allow-same-version

          if [ -f "app.config.js" ]; then
            sed -i -E "s/version: ['\"][0-9]+\.[0-9]+\.[0-9]+['\"]/version: '$CLEAN_VERSION'/g" app.config.js
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add package.json package-lock.json app.config.js
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: bump version to $CLEAN_VERSION"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Install dependencies
        run: npm install

      - name: Determine Release Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.target_tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
      
      - name: Create Google Play Key File
        run: echo '${{ secrets.GOOGLE_PLAY_KEY }}' > google-play-key.json

      - name: Build and Auto-Submit Production iOS
        if: github.event.inputs.build_production == 'true'
        run: eas build --platform ios --profile production --non-interactive --auto-submit --no-wait

      - name: Build Production Android
        if: github.event.inputs.build_production == 'true'
        run: eas build --platform android --profile production --local --non-interactive --output ./app-production.aab

      - name: Submit Production Android
        if: github.event.inputs.build_production == 'true'
        run: eas submit --platform android --profile production --path ./app-production.aab --non-interactive

      - name: Build APK for GitHub Release
        if: github.event.inputs.skip_build != 'true'
        run: eas build --platform android --profile preview --local --non-interactive --output ./ukit-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./ukit-release.apk
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
